version: '3.4'

services:
  hybookify.api:
    image: ${DOCKER_REGISTRY-}hybookifyapi
    container_name: hyBookify.Api
    build:
      context: .
      dockerfile: hyBookify.Api/Dockerfile
    depends_on:
      - hybookify-db

  hybookify-db:
    image: postgres:17-alpine
    container_name: hyBookify.Db
    environment:
      - POSTGRES_DB=hybookify
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/database:/var/lib/postgresql/data
    ports:
      - 5432:5432
  
  hybookify-idp:
    image: quay.io/keycloak/keycloak:latest
    container_name: hyBookify.Identity
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./.containers/identity:/opt/keycloak/data
      - ./.files/bookify-realm-export.json:/opt/keycloak/data/import/realm.json
    ports:
      - 18080:8080
  
  hybookify-seq:
    image: datalust/seq:latest
    container_name: hyBookify.Seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - 5341:5341
      - 8081:80
        
  hybookify-redis:
    image: redis:latest
    container_name: hyBookify.Redis
    restart: always
    ports:
      - '6379:6379'